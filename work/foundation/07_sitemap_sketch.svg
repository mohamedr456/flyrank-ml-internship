<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" width="900" height="560" font-family="Space Grotesk, Inter, sans-serif">
  <rect width="900" height="560" fill="#FAFAF9"/>
  <text x="450" y="44" text-anchor="middle" font-size="26" font-weight="700" fill="#111827">Portfolio sitemap — the path to one action</text>
  <text x="450" y="70" text-anchor="middle" font-size="14" fill="#6B7280">one reader: a junior-ML hiring manager · one action: read the paper, then email me</text>

  <!-- Landing -->
  <g>
    <rect x="40" y="110" width="190" height="150" rx="10" fill="#FFFFFF" stroke="#0F766E" stroke-width="3"/>
    <text x="135" y="140" text-anchor="middle" font-size="18" font-weight="700" fill="#0F766E">LANDING</text>
    <text x="135" y="168" text-anchor="middle" font-size="12" fill="#111827">“I turn real search data</text>
    <text x="135" y="184" text-anchor="middle" font-size="12" fill="#111827">into ranked actions.”</text>
    <text x="135" y="206" text-anchor="middle" font-size="12" fill="#111827">+ one honest number</text>
    <text x="135" y="236" text-anchor="middle" font-size="11" font-weight="700" fill="#D97706">CTA: read the paper</text>
  </g>

  <!-- Work -->
  <g>
    <rect x="262" y="110" width="190" height="150" rx="10" fill="#FFFFFF" stroke="#0F766E" stroke-width="3"/>
    <text x="357" y="140" text-anchor="middle" font-size="18" font-weight="700" fill="#0F766E">WORK</text>
    <text x="357" y="168" text-anchor="middle" font-size="12" fill="#111827">capstone first (results!),</text>
    <text x="357" y="184" text-anchor="middle" font-size="12" fill="#111827">then 2 supporting cases</text>
    <text x="357" y="206" text-anchor="middle" font-size="12" fill="#111827">each: problem → did → came of it</text>
    <text x="357" y="236" text-anchor="middle" font-size="11" font-weight="700" fill="#D97706">CTA: read the paper / repo</text>
  </g>

  <!-- About -->
  <g>
    <rect x="484" y="110" width="190" height="150" rx="10" fill="#FFFFFF" stroke="#0F766E" stroke-width="3"/>
    <text x="579" y="140" text-anchor="middle" font-size="18" font-weight="700" fill="#0F766E">ABOUT</text>
    <text x="579" y="168" text-anchor="middle" font-size="12" fill="#111827">4 sentences, voice card:</text>
    <text x="579" y="184" text-anchor="middle" font-size="12" fill="#111827">direct · concrete · numbers first</text>
    <text x="579" y="206" text-anchor="middle" font-size="12" fill="#111827">+ “how I work with AI”, honest</text>
    <text x="579" y="236" text-anchor="middle" font-size="11" font-weight="700" fill="#D97706">CTA: email me</text>
  </g>

  <!-- Contact -->
  <g>
    <rect x="706" y="110" width="160" height="150" rx="10" fill="#FFFFFF" stroke="#0F766E" stroke-width="3"/>
    <text x="786" y="140" text-anchor="middle" font-size="18" font-weight="700" fill="#0F766E">CONTACT</text>
    <text x="786" y="168" text-anchor="middle" font-size="12" fill="#111827">email · GitHub</text>
    <text x="786" y="184" text-anchor="middle" font-size="12" fill="#111827">LinkedIn</text>
    <text x="786" y="206" text-anchor="middle" font-size="12" fill="#111827">zero friction</text>
    <text x="786" y="236" text-anchor="middle" font-size="11" font-weight="700" fill="#D97706">CTA: email about the role</text>
  </g>

  <!-- flow arrows -->
  <g stroke="#111827" stroke-width="2.5" fill="#111827">
    <line x1="230" y1="185" x2="258" y2="185"/><polygon points="262,185 252,180 252,190"/>
    <line x1="452" y1="185" x2="480" y2="185"/><polygon points="484,185 474,180 474,190"/>
    <line x1="674" y1="185" x2="702" y2="185"/><polygon points="706,185 696,180 696,190"/>
  </g>

  <!-- convergence to one action -->
  <g stroke="#0F766E" stroke-width="2.5" fill="none" stroke-dasharray="7,5">
    <path d="M135 260 L135 360 L450 400"/>
    <path d="M357 260 L357 340 L450 395"/>
    <path d="M579 260 L579 340 L450 395"/>
    <path d="M786 260 L786 360 L450 400"/>
  </g>
  <g>
    <rect x="270" y="400" width="360" height="88" rx="12" fill="#0F766E"/>
    <text x="450" y="436" text-anchor="middle" font-size="19" font-weight="700" fill="#FAFAF9">★ THE ONE ACTION ★</text>
    <text x="450" y="464" text-anchor="middle" font-size="14" fill="#FAFAF9">read the capstone paper → email me</text>
  </g>

  <!-- resisted list -->
  <text x="450" y="524" text-anchor="middle" font-size="12" fill="#6B7280">resisted: blog ✗ · skills grid ✗ · testimonials ✗ — every page must earn its place against the claim</text>
  <text x="836" y="548" text-anchor="end" font-size="11" fill="#6B7280">MR · Week 1</text>
</svg>
